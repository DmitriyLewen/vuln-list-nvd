name: Update vuln-list-nvd repo
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    name: Update vuln-list-nvd
    runs-on: ubuntu-latest
    env:
      VULN_LIST_DIR: "vuln-list-nvd"
    steps:
      - name: Check out vuln-list-update
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          repository: ${{ github.repository_owner }}/vuln-list-update

      - name: Check out vuln-list-nvd
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          repository: ${{ github.repository }}
          path: ${{ env.VULN_LIST_DIR }}

      - name: Set up Go
        uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6.0.0
        with:
          go-version-file: go.mod

      - name: Setup github user email and name
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"

      - name: Compile vuln-list-update
        run: go build -o vuln-list-update .

      - if: always()
        name: NVD
        run: ./scripts/update.sh nvd "NVD"
